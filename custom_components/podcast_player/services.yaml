add_feed:
  name: Add podcast feed
  description: Add an RSS podcast feed and refresh it immediately.
  fields:
    rss_url:
      required: true
      selector:
        text: {}
      name: RSS URL
      description: Podcast RSS feed URL.
remove_feed:
  name: Remove podcast feed
  description: Remove a feed. Listening history can optionally be kept.
  fields:
    feed_id:
      required: true
      selector:
        text: {}
      name: Feed ID
    keep_history:
      required: false
      default: true
      selector:
        boolean: {}
      name: Keep listening history
refresh:
  name: Refresh feeds
  description: Refresh selected Podcast feed sensor target(s), one feed by feed_id/feed_name, or all feeds if omitted. Action
    Target = podcast feed sensor.
  target:
    entity:
    - integration: podcast_player
      domain: sensor
  fields:
    feed_id:
      required: false
      selector:
        text: {}
      name: Feed ID
      description: Legacy exact feed ID. Prefer selecting a Podcast feed sensor as the action Target in the UI.
    feed_name:
      required: false
      selector:
        text: {}
      name: Feed name
      description: Friendly fallback, e.g. Candace or Joe Rogan. Target entity wins if a Podcast feed sensor is selected.
refresh_feeds:
  name: Refresh feeds
  description: Alias for refresh. Action Target = podcast feed sensor; feed_id/feed_name remain backward-compatible fallbacks.
  target:
    entity:
    - integration: podcast_player
      domain: sensor
  fields:
    feed_id:
      required: false
      selector:
        text: {}
      name: Feed ID
      description: Legacy exact feed ID. Prefer selecting a Podcast feed sensor as the action Target in the UI.
    feed_name:
      required: false
      selector:
        text: {}
      name: Feed name
      description: Friendly fallback, e.g. Candace or Joe Rogan. Target entity wins if a Podcast feed sensor is selected.
play_episode:
  name: Play episode
  description: Play a specific episode by ID. Leave Output media player empty for browser/card playback, or set it to a speaker/TV.
  fields:
    episode_id:
      required: true
      selector:
        text: {}
      name: Episode ID
    media_player_entity_id:
      required: false
      selector:
        entity:
          domain: media_player
      name: Output media player (speaker/TV)
      description: Speaker/TV output, e.g. media_player.bedroom_tv. Leave empty for browser/card output.
    url_mode:
      required: false
      default: direct
      selector:
        select:
          options:
          - direct
          - signed_proxy
      name: URL mode
      description: Direct sends the original podcast URL. Signed proxy sends a temporary Home Assistant proxy URL for speakers
        that cannot reach the original URL.
    media_content_type:
      required: false
      default: music
      selector:
        select:
          options:
          - music
          - podcast
      name: Media content type
      description: Most speakers/TVs work best with music. Try podcast only if a target handles it better.
    resume_position:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Resume position
      description: Optional seconds offset. If omitted, stored progress is used.
    prefer_proxy:
      required: false
      default: false
      selector:
        boolean: {}
      name: Prefer HA proxy URL legacy option
      description: Legacy option. If true, url_mode becomes signed_proxy.
play_current:

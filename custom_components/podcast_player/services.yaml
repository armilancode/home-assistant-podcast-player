add_feed:
  name: Add podcast feed
  description: Add an RSS podcast feed and refresh it immediately.
  fields:
    rss_url:
      required: true
      selector:
        text:
          type: url
      name: RSS URL
      description: The podcast RSS feed URL.

remove_feed:
  name: Remove podcast feed
  description: Remove a podcast feed. Listening history can be kept.
  fields:
    feed_id:
      required: true
      selector:
        text: {}
      name: Feed ID
      description: The exact feed ID to remove. For interactive use, remove feeds from the integration options.
    keep_history:
      required: false
      default: true
      selector:
        boolean: {}
      name: Keep listening history
      description: Keep episode progress after removing the feed.

refresh:
  name: Refresh podcast feeds
  description: Refresh selected podcast feed targets, or refresh all feeds when no target is selected.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields: {}

refresh_feeds:
  name: Refresh podcast feeds
  description: Refresh selected podcast feed targets, or refresh all feeds when no target is selected.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields: {}

play_episode:
  name: Play podcast episode
  description: Play a specific episode. Leave the output media player empty for browser/card playback.
  fields:
    episode_id:
      required: true
      selector:
        text: {}
      name: Episode ID
      description: The episode ID to play.
    media_player_entity_id:
      required: false
      selector:
        entity:
          domain: media_player
      name: Output media player
      description: Optional Home Assistant media player for external playback.
    url_mode:
      required: false
      default: direct
      selector:
        select:
          options:
            - direct
            - signed_proxy
      name: URL mode
      description: Use the original podcast URL, or a temporary Home Assistant proxy URL for media players that need it.
    media_content_type:
      required: false
      default: music
      selector:
        select:
          options:
            - music
            - podcast
      name: Media content type
      description: Most media players work best with music. Use podcast only if the target handles it better.
    resume_position:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Resume position
      description: Optional start position in seconds. If omitted, saved progress is used.

play_current:
  name: Play current podcast episode
  description: Play the current episode. Select podcast feed targets only when you want to restrict episode selection.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields:
    media_player_entity_id:
      required: false
      selector:
        entity:
          domain: media_player
      name: Output media player
      description: Optional Home Assistant media player for external playback. Leave empty for browser/card playback.
    url_mode:
      required: false
      default: direct
      selector:
        select:
          options:
            - direct
            - signed_proxy
      name: URL mode
      description: Use the original podcast URL, or a temporary Home Assistant proxy URL for media players that need it.
    media_content_type:
      required: false
      default: music
      selector:
        select:
          options:
            - music
            - podcast
      name: Media content type
      description: Most media players work best with music. Use podcast only if the target handles it better.
    resume_position:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Resume position
      description: Optional start position in seconds. If omitted, saved progress is used.

play_latest:
  name: Play latest podcast episode
  description: Play the newest episode from selected podcast feed targets, or from all feeds when no target is selected.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields:
    media_player_entity_id:
      required: false
      selector:
        entity:
          domain: media_player
      name: Output media player
      description: Optional Home Assistant media player for external playback. Leave empty for browser/card playback.
    url_mode:
      required: false
      default: direct
      selector:
        select:
          options:
            - direct
            - signed_proxy
      name: URL mode
      description: Use the original podcast URL, or a temporary Home Assistant proxy URL for media players that need it.
    media_content_type:
      required: false
      default: music
      selector:
        select:
          options:
            - music
            - podcast
      name: Media content type
      description: Most media players work best with music. Use podcast only if the target handles it better.
    resume_position:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Resume position
      description: Optional start position in seconds. If omitted, saved progress is used.

play_next_unplayed:
  name: Play next unplayed podcast episode
  description: Play the newest unplayed episode from selected podcast feed targets, or from all feeds when no target is selected.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields:
    media_player_entity_id:
      required: false
      selector:
        entity:
          domain: media_player
      name: Output media player
      description: Optional Home Assistant media player for external playback. Leave empty for browser/card playback.
    url_mode:
      required: false
      default: direct
      selector:
        select:
          options:
            - direct
            - signed_proxy
      name: URL mode
      description: Use the original podcast URL, or a temporary Home Assistant proxy URL for media players that need it.
    media_content_type:
      required: false
      default: music
      selector:
        select:
          options:
            - music
            - podcast
      name: Media content type
      description: Most media players work best with music. Use podcast only if the target handles it better.
    resume_position:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Resume position
      description: Optional start position in seconds. If omitted, saved progress is used.

resume:
  name: Resume podcast playback
  description: Resume the current podcast. Browser playback resumes from the card; external playback resumes through the media player when supported.
  fields: {}

pause:
  name: Pause podcast playback
  description: Pause the current podcast state or the active external media player when supported.
  fields: {}

stop:
  name: Stop podcast playback
  description: Stop the active Podcast Player output.
  fields:
    force:
      required: false
      default: false
      selector:
        boolean: {}
      name: Force stop
      description: Stop the external target even if it may no longer be playing this podcast session.

stop_output:
  name: Stop podcast output
  description: Stop the current Podcast Player output, or stop a specific output media player.
  fields:
    media_player_entity_id:
      required: false
      selector:
        entity:
          domain: media_player
      name: Output media player
      description: Optional media player to stop. Leave empty to stop the current Podcast Player output.
    force:
      required: false
      default: false
      selector:
        boolean: {}
      name: Force stop
      description: Stop the external target even if it may no longer be playing this podcast session.

seek:
  name: Seek podcast episode
  description: Store a new playback position and seek the active external media player when supported.
  fields:
    episode_id:
      required: true
      selector:
        text: {}
      name: Episode ID
      description: The episode ID to update.
    position:
      required: true
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Position
      description: The playback position in seconds.

save_progress:
  name: Save podcast progress
  description: Save playback progress from the card or an automation.
  fields:
    episode_id:
      required: true
      selector:
        text: {}
      name: Episode ID
      description: The episode ID to update.
    position:
      required: true
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Position
      description: Current playback position in seconds.
    duration:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Duration
      description: Episode duration in seconds.
    playing:
      required: false
      selector:
        boolean: {}
      name: Playing
      description: Whether the episode is currently playing.
    speed:
      required: false
      selector:
        select:
          options:
            - "0.75"
            - "1.0"
            - "1.25"
            - "1.5"
            - "1.75"
            - "2.0"
      name: Playback speed
      description: Current playback speed.

mark_played:
  name: Mark episode played
  description: Mark one episode as played.
  fields:
    episode_id:
      required: true
      selector:
        text: {}
      name: Episode ID
      description: The episode ID to mark.

mark_unplayed:
  name: Mark episode unplayed
  description: Mark one episode as unplayed.
  fields:
    episode_id:
      required: true
      selector:
        text: {}
      name: Episode ID
      description: The episode ID to mark.

mark_current_played:
  name: Mark current episode played
  description: Mark the current episode as played or unplayed.
  fields:
    played:
      required: false
      default: true
      selector:
        boolean: {}
      name: Played
      description: Turn on to mark played, or turn off to mark unplayed.

mark_feed_played:
  name: Mark feed episodes played
  description: Mark all active episodes from selected podcast feed targets as played or unplayed.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields:
    played:
      required: false
      default: true
      selector:
        boolean: {}
      name: Played
      description: Turn on to mark played, or turn off to mark unplayed.

set_speed:
  name: Set podcast playback speed
  description: Set the default playback speed and optionally update one episode.
  fields:
    speed:
      required: true
      selector:
        select:
          options:
            - "0.75"
            - "1.0"
            - "1.25"
            - "1.5"
            - "1.75"
            - "2.0"
      name: Playback speed
      description: The playback speed to use.
    episode_id:
      required: false
      selector:
        text: {}
      name: Episode ID
      description: Optional episode ID to update.

play_on_media_player:
  name: Play podcast on media player
  description: Send current, latest, next-unplayed, or selected podcast audio to a Home Assistant media player.
  target:
    entity:
      integration: podcast_player
      domain: sensor
  fields:
    media_player_entity_id:
      required: true
      selector:
        entity:
          domain: media_player
      name: Output media player
      description: The Home Assistant media player that should play the podcast.
    episode_id:
      required: false
      selector:
        text: {}
      name: Episode ID
      description: Optional exact episode ID. If set, episode choice and feed targets are ignored.
    episode_mode:
      required: false
      default: current
      selector:
        select:
          options:
            - current
            - next_unplayed
            - latest
      name: Episode choice
      description: Which episode to send when no exact episode ID is provided.
    url_mode:
      required: false
      default: direct
      selector:
        select:
          options:
            - direct
            - signed_proxy
      name: URL mode
      description: Use the original podcast URL, or a temporary Home Assistant proxy URL for media players that need it.
    media_content_type:
      required: false
      default: music
      selector:
        select:
          options:
            - music
            - podcast
      name: Media content type
      description: Most media players work best with music. Use podcast only if the target handles it better.
    resume_position:
      required: false
      selector:
        number:
          min: 0
          mode: box
          unit_of_measurement: seconds
      name: Resume position
      description: Optional start position in seconds. If omitted, saved progress is used.

stop_media_player:
  name: Stop podcast media player
  description: Stop a media player used for podcast output.
  target:
    entity:
      domain: media_player
  fields:
    force:
      required: false
      default: false
      selector:
        boolean: {}
      name: Force stop
      description: Stop the external target even if it may no longer be playing this podcast session.

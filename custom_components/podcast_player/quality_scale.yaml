rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands:
    status: todo
    comment: Add Home Assistant brands assets before core submission.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-conditions:
    status: exempt
    comment: This integration does not provide conditions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  docs-triggers:
    status: exempt
    comment: This integration does not provide triggers.
  entity-event-setup:
    status: exempt
    comment: Entities do not subscribe to external event callbacks directly.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: This integration does not authenticate against an account or device API.
  test-coverage:
    status: todo
    comment: Coverage tooling is configured; raise integration coverage above 95%, with API and coordinator paths as the largest remaining gaps.

  # Gold
  devices: done
  diagnostics:
    status: todo
    comment: Implement downloadable diagnostics with sensitive data redaction.
  discovery-update-info:
    status: exempt
    comment: This integration does not use discovery.
  discovery:
    status: exempt
    comment: Podcast feeds are added by the user and are not discoverable on the network.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Podcast feeds are dynamic entities, not device registry devices.
  entity-category:
    status: todo
    comment: Audit entity categories for every entity.
  entity-device-class:
    status: todo
    comment: Audit device classes and state classes for all eligible sensors.
  entity-disabled-by-default: done
  entity-translations:
    status: todo
    comment: Move entity names to translation keys.
  exception-translations:
    status: todo
    comment: Move user-facing exception messages to translation keys.
  icon-translations:
    status: todo
    comment: Move entity icons to icon translations where appropriate.
  reconfiguration-flow:
    status: todo
    comment: Add a dedicated reconfigure flow for existing entries.
  repair-issues:
    status: todo
    comment: Add repair issues for user intervention cases.
  stale-devices:
    status: exempt
    comment: The integration has one static device registry device and dynamic feed entities.

  # Platinum
  async-dependency:
    status: todo
    comment: Replace or isolate synchronous feed parsing so dependency usage satisfies async requirements.
  inject-websession:
    status: exempt
    comment: Network I/O uses Home Assistant aiohttp sessions directly; the parser dependency performs no HTTP I/O.
  strict-typing:
    status: todo
    comment: Add strict typing and resolve all typing issues.
